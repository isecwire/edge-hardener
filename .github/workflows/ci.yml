name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shellcheck main script and checks
        run: shellcheck edge_hardener.sh checks/*.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python syntax check
        run: python -m py_compile generate_report.py

      - name: Run bash tests
        run: bash tests/test_edge_hardener.sh

      - name: Install pytest and run Python tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pytest -v tests/test_report.py
